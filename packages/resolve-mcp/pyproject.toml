[project]
name = "resolve-mcp"
version = "0.1.0"
description = "MCP server that drives DaVinci Resolve Studio's scripting API. First-party, dependency-light."
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.2,<2",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.6,<3",
    "structlog>=24.4,<25",
]

[project.scripts]
resolve-mcp = "resolve_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/resolve_mcp"]
